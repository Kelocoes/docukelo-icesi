<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bottom layer (3D Block) -->
  <!-- Top Face -->
  <path d="M12 72 L50 87 L88 72 L50 57 Z" fill="#94A3B8" fill-opacity="0.05" stroke="#94A3B8" stroke-width="2.5" stroke-linejoin="round" />
  <!-- Front Left Face -->
  <path d="M12 72 L50 87 L50 93 L12 78 Z" fill="#94A3B8" fill-opacity="0.2" stroke="#94A3B8" stroke-width="2.5" stroke-linejoin="round" />
  <!-- Front Right Face -->
  <path d="M50 87 L88 72 L88 78 L50 93 Z" fill="#94A3B8" fill-opacity="0.4" stroke="#94A3B8" stroke-width="2.5" stroke-linejoin="round" />

  <!-- Middle layer (3D Block) -->
  <!-- Top Face -->
  <path d="M12 48 L50 63 L88 48 L50 33 Z" fill="#003B6D" fill-opacity="0.05" stroke="#003B6D" stroke-width="2.5" stroke-linejoin="round" />
  <!-- Front Left Face -->
  <path d="M12 48 L50 63 L50 69 L12 54 Z" fill="#003B6D" fill-opacity="0.2" stroke="#003B6D" stroke-width="2.5" stroke-linejoin="round" />
  <!-- Front Right Face -->
  <path d="M50 63 L88 48 L88 54 L50 69 Z" fill="#003B6D" fill-opacity="0.4" stroke="#003B6D" stroke-width="2.5" stroke-linejoin="round" />

  <!-- Top layer (3D Block) -->
  <!-- Top Face -->
  <path d="M12 24 L50 39 L88 24 L50 9 Z" fill="#00A3E0" fill-opacity="0.05" stroke="#00A3E0" stroke-width="3" stroke-linejoin="round" />
  <!-- Front Left Face -->
  <path d="M12 24 L50 39 L50 45 L12 30 Z" fill="#00A3E0" fill-opacity="0.2" stroke="#00A3E0" stroke-width="3" stroke-linejoin="round" />
  <!-- Front Right Face -->
  <path d="M50 39 L88 24 L88 30 L50 45 Z" fill="#00A3E0" fill-opacity="0.4" stroke="#00A3E0" stroke-width="3" stroke-linejoin="round" />

  <!-- Bracket symbols drawn isometrically on the top layer -->
  <!-- Left isometric bracket < -->
  <path d="M42 20 L34 24 L42 28" fill="none" stroke="#00A3E0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Right isometric bracket > -->
  <path d="M58 20 L66 24 L58 28" fill="none" stroke="#00A3E0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
</svg>